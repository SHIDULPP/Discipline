name: discipline
description: "Discipline — offline habit enforcement for Android."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  equatable: ^2.0.7
  intl: ^0.20.2
  uuid: ^4.5.1

  # Platform services (Android alarms & notifications)
  flutter_local_notifications: ^18.0.1
  android_alarm_manager_plus: ^4.0.7
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

  # Uncomment when implementing Hive adapters:
  # build_runner: ^2.4.15
  # hive_generator: ^2.0.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/png/logo.png"

